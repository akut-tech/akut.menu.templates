---
layout: showcase
title: Akut Templates
---
{% for tpl in site.data.showcase %}
<div class="col-md-6">
  <a class="sc-card" href="{{ tpl.url }}" target="_blank" rel="noopener noreferrer">
    <div class="sc-card-accent" style="background:{{ tpl.accent }}"></div>
    <div class="sc-card-body">
      <h2 class="sc-card-name">{{ tpl.name }}</h2>
      <p class="sc-card-desc">{{ tpl.description }}</p>
    </div>
    <div class="sc-card-footer">
      <span class="sc-cta" style="color:{{ tpl.accent }}">
        View demo <i class="bi bi-arrow-right"></i>
      </span>
    </div>
  </a>
</div>
{% endfor %}
