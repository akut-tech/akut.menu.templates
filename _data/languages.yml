# Maps the numeric `DefaultLanguage` value in the menu JSON to the language
# KEY used inside localized objects, e.g. { "English": "Lunch Menu" }.
#
# The runtime always builds the language switcher from the keys actually present
# in the data; this map only decides the INITIAL language and provides display
# labels. Adjust to match the real Akut language enum if it differs.
#
# Known: 2 => English (confirmed from sample data).
0: { key: Portuguese, code: pt, label: "Português" }
1: { key: Spanish,    code: es, label: "Español" }
2: { key: English,    code: en, label: "English" }
3: { key: French,     code: fr, label: "Français" }
4: { key: German,     code: de, label: "Deutsch" }
5: { key: Italian,    code: it, label: "Italiano" }
