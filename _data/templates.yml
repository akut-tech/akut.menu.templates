# Registry of available menu templates.
# The menu JSON's `TemplateId` is matched (case-insensitive) against the keys
# in `list`. The S3 value "default" is aliased to `classic` below. Unknown
# TemplateId values (e.g. "epicurean", the old name, or the "epicureanm"
# typo) fall back to `default` automatically via menu-core.js.
default: classic

aliases:
  default: classic
  epicurean: classic
  epicureanm: classic

list:
  classic:
    name: Classic
    main: /templates/classic/
    detail: /templates/classic/detail/
  deepblue:
    name: Deep Blue
    main: /templates/deepblue/
    detail: /templates/deepblue/detail/
  senjutsu:
    name: Senjutsu
    main: /templates/senjutsu/
    category: /templates/senjutsu/category/
    detail: /templates/senjutsu/item/
  lisbon:
    name: Lisbon
    main: /templates/lisbon/
    category: /templates/lisbon/category/
    detail: /templates/lisbon/item/
  trattoria:
    name: Trattoria
    main: /templates/trattoria/
    category: /templates/trattoria/category/
    detail: /templates/trattoria/item/
  brunch:
    name: Brunch
    main: /templates/brunch/
    category: /templates/brunch/category/
    detail: /templates/brunch/item/
  coffee:
    name: Coffee
    main: /templates/coffee/
    category: /templates/coffee/category/
    detail: /templates/coffee/item/
  brasserie:
    name: Brasserie
    main: /templates/brasserie/
    category: /templates/brasserie/category/
    detail: /templates/brasserie/item/
