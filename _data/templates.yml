# Registry of available menu templates.
# The menu JSON's `TemplateId` is matched (case-insensitive) against the keys
# in `list`. The S3 value "default" is aliased to `default` below.
default: epicurean

aliases:
  default: epicurean

list:
  epicurean:
    name: Epicurean
    main: /templates/epicurean/
    detail: /templates/epicurean/detail/
  deepblue:
    name: Deep Blue
    main: /templates/deepblue/
    detail: /templates/deepblue/detail/
  senjutsu:
    name: Senjutsu
    main: /templates/senjutsu/
    category: /templates/senjutsu/category/
  lisbon:
    name: Lisbon
    main: /templates/lisbon/
    category: /templates/lisbon/category/
    detail: /templates/lisbon/item/
  trattoria:
    name: Trattoria
    main: /templates/trattoria/
    category: /templates/trattoria/category/
    detail: /templates/trattoria/item/
