# Maps the numeric values in an item's `Diets` array to a human label.
# Keys match akut.domain.FoodDietType enum values exactly.
#
# Each entry is keyed by language name (matching the localized fields in the
# menu JSON, e.g. "English"). The runtime resolves the active language, then
# falls back to English. A plain string is still accepted for back-compat.
