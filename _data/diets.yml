6:  { English: Sugar-Free,       Portuguese: Sem Açúcar,             Spanish: Sin Azúcar,             French: Sans Sucre }
7:  { English: Caffeine-Free,    Portuguese: Sem Cafeína,            Spanish: Sin Cafeína,            French: Sans Caféine }
