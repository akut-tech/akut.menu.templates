<!-- Header: tenant logo + language switcher (populated at runtime) -->
<header>
  <div class="menu-area menu-area-two">
    <div class="container">
      <div class="row align-items-center gy-3">
        <div class="col-6 col-lg-4 order-1">
          <div class="menu-logo-wrap">
            <a href="#" data-menu-home>
              <img data-menu-logo src="{{ '/assets/images/logo-two.svg' | relative_url }}" alt="">
            </a>
          </div>
        </div>
        <div class="col-12 col-lg-4 order-3 order-lg-2 text-center">
          <p class="menu-tagline mb-0" data-menu-tagline></p>
        </div>
        <div class="col-6 col-lg-4 order-2 order-lg-3">
          <div class="d-flex justify-content-end align-items-center">
            <div class="lang-switcher" data-lang-switcher hidden>
              <button type="button" class="lang-current" aria-haspopup="true" aria-expanded="false">
                <i class="bi bi-globe2"></i>
                <span data-lang-current-label>Language</span>
                <i class="bi bi-chevron-down"></i>
              </button>
              <ul class="lang-menu custom-ul" data-lang-menu></ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
