<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
<title>{{ page.title | default: site.title }}</title>

<link rel="icon" href="{{ '/assets/images/fav.png' | relative_url }}" type="image/png" sizes="20x20">

<!-- Icon font -->
<link rel="stylesheet" href="{{ '/assets/css/bootstrap-icons.css' | relative_url }}">
<!-- Lightbox (item gallery zoom) -->
<link rel="stylesheet" href="{{ '/assets/css/magnific-popup.css' | relative_url }}">
<!-- Grid / components (tabs) -->
<link rel="stylesheet" href="{{ '/assets/css/bootstrap.min.css' | relative_url }}">
<!-- Theme -->
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
<!-- Akut menu overrides -->
<link rel="stylesheet" href="{{ '/assets/css/menu.css' | relative_url }}">
{% if page.template_css %}
<!-- Per-template styling -->
<link rel="stylesheet" href="{{ '/assets/css/' | append: page.template_css | append: '.css' | relative_url }}">
{% endif %}
