<div class="db">
  <!-- Top bar: logo + language -->
  <header class="db-topbar db-topbar-solid">
    <div class="db-container db-topbar-inner">
      <a class="db-brand" href="#" data-menu-home>
        <span class="db-brand-mark"><i class="bi bi-water"></i></span>
        <span class="db-brand-text" data-menu-name>Deep Blue</span>
      </a>
      <div class="db-lang lang-switcher" data-lang-switcher hidden>
        <button type="button" class="db-lang-btn lang-current" aria-haspopup="true" aria-expanded="false">
          <i class="bi bi-globe2"></i>
          <span data-lang-current-label>Language</span>
          <i class="bi bi-chevron-down db-lang-caret"></i>
        </button>
        <ul class="db-lang-menu custom-ul" data-lang-menu></ul>
      </div>
    </div>
  </header>

  <!-- Breadcrumb -->
  <div class="db-crumb">
    <div class="db-container">
      <a href="#" data-menu-home><i class="bi bi-arrow-left"></i> <span data-i18n="menu">Menu</span></a>
      <i class="bi bi-chevron-right db-crumb-sep"></i>
      <span data-item-name-crumb>Details</span>
    </div>
  </div>

  <!-- Item detail (rendered at runtime) -->
  <main class="db-detail-area">
    <div class="db-container">
      <div id="detail-root">
        <div class="db-loading">

            <span class="db-loader-wave"></span>

          <span class="db-loading-label">Loading…</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="db-footer">
    <span class="db-shape db-shape-chef" aria-hidden="true"></span>
    <div class="db-container db-footer-inner">
      <a class="db-brand db-footer-brand" href="#" data-menu-home>
        <span class="db-brand-mark"><i class="bi bi-water"></i></span>
        <span class="db-brand-text" data-menu-name>Deep Blue</span>
      </a>
      <p class="db-footer-notes" data-menu-notes></p>
      <p class="db-footer-copy">
        &copy; <span data-current-year></span> <span data-menu-name></span>
        <span class="db-footer-powered">· Powered by Akut</span>
      </p>
