---
layout: base
permalink: /templates/brunch/
title: Menu
no_chrome: true
template_css: brunch
template_js: brunch
---

<div class="bn">
  <!-- Header -->
  <header class="bn-header">
    <div class="bn-container bn-header-inner">
      <a class="bn-brand" href="#" data-menu-home>
        <span class="bn-brand-mark">
          <span class="bn-brand-dot"></span>
        </span>
        <span class="bn-brand-name" data-menu-name>Menu</span>
      </a>
      <div class="bn-lang" data-lang-switcher hidden>
        <button type="button" class="bn-lang-btn lang-current" aria-haspopup="true" aria-expanded="false">
          <i class="bi bi-globe2"></i>
          <span data-lang-current-label>Language</span>
          <i class="bi bi-chevron-down bn-lang-caret"></i>
        </button>
        <ul class="bn-lang-menu bn-ul" data-lang-menu></ul>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="bn-hero" style="background-image:url('{{ '/assets/images/brunch/coffee-hero-bg.png' | relative_url }}');">
    <div class="bn-container bn-hero-inner">
      <div class="bn-hero-main">
        <p class="bn-eyebrow" data-tr-i18n="welcomeTo">Welcome to</p>
        <h1 class="bn-hero-title">
          <span data-menu-name>Menu</span>
          <span class="bn-hero-title-accent" data-tr-i18n="menuWord">Menu</span>
        </h1>
        <p class="bn-hero-desc" data-menu-description></p>
        <div class="bn-hero-chips">
          <span class="bn-chip" data-availability-chip hidden>
            <span class="bn-chip-dot"></span>
            <span data-availability></span>
          </span>
        </div>
      </div>
      <div class="bn-hero-media">
        <img src="{{ '/assets/images/brunch/coffee-cup-hero.png' | relative_url }}" alt="Latte art in a white cup with coffee beans">
      </div>
    </div>
  </section>

  <!-- Categories -->
  <main class="bn-container bn-main">
    <section class="bn-categories">
      <div class="bn-section-head">
        <div>
          <p class="bn-eyebrow" data-tr-i18n="theMenu">The menu</p>
          <h2 class="bn-section-title" data-tr-i18n="chooseCourse">Choose a course</h2>
        </div>
        <img class="bn-spoon-accent" src="{{ '/assets/images/brunch/spoon-accent.png' | relative_url }}" alt="" aria-hidden="true">
      </div>

      <div id="menu-root">
        <div class="bn-loading">
          <div class="bn-loader"></div>
          <span>Loading…</span>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="bn-footer">
    <img class="bn-footer-beans" src="{{ '/assets/images/brunch/scattered-coffee-beans.png' | relative_url }}" alt="" aria-hidden="true">
    <div class="bn-container bn-footer-inner">
      <p class="bn-footer-tagline" data-tr-i18n="estSlowMornings">Est. slow mornings</p>
      <p class="bn-footer-copy">
        &copy; <span data-current-year></span>
        <span data-menu-name></span>
        · Powered by Akut
      </p>
    </div>
  </footer>
</div>
