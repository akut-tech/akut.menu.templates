---
layout: base
permalink: /templates/trattoria/
title: Menu
no_chrome: true
template_css: trattoria
template_js: trattoria
---

<div class="tr">
  <!-- Checkered top strip -->
  <div class="tr-checkered-strip" aria-hidden="true"></div>

  <!-- Header -->
  <header class="tr-header">
    <div class="tr-container tr-header-inner">
      <a class="tr-brand" href="#" data-menu-home>
        <span class="tr-brand-mark">
          <span class="tr-brand-badge"></span>
        </span>
        <span class="tr-brand-text">
          <span class="tr-brand-script">trattoria</span>
          <span class="tr-brand-name" data-menu-name>Menu</span>
        </span>
      </a>
      <div class="tr-lang" data-lang-switcher hidden>
        <button type="button" class="tr-lang-btn lang-current" aria-haspopup="true" aria-expanded="false">
          <i class="bi bi-globe2"></i>
          <span data-lang-current-label>Language</span>
          <i class="bi bi-chevron-down tr-lang-caret"></i>
        </button>
        <ul class="tr-lang-menu tr-ul" data-lang-menu></ul>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="tr-hero">
    <div class="tr-container tr-hero-inner">
      <div class="tr-hero-main">
        <p class="tr-script tr-hero-eyebrow" data-tr-i18n="welcomeTo">Benvenuti a</p>
        <h1 class="tr-hero-title" data-menu-name>Menu</h1>
        <p class="tr-hero-desc" data-menu-description></p>
        <div class="tr-hero-chips">
          <span class="tr-chip" data-availability-chip hidden>
            <span class="tr-chip-dot"></span>
            <span data-availability></span>
          </span>
          <span class="tr-chip" data-founded-chip hidden>
            <span data-founded-year></span>
          </span>
        </div>
      </div>
      <div class="tr-hero-tile" aria-hidden="true"></div>
    </div>
    <div class="tr-tricolore tr-container"></div>
  </section>

  <!-- Categories -->
  <section class="tr-categories">
    <div class="tr-container">
      <div class="tr-section-head">
        <div>
          <p class="tr-script tr-section-eyebrow" data-tr-i18n="ilMenu">Il Menù</p>
          <h2 class="tr-section-title" data-tr-i18n="categories">Categories</h2>
        </div>
        <div class="tr-checkered-tile" aria-hidden="true"></div>
      </div>

      <div id="menu-root">
        <div class="tr-loading">
          <div class="tr-loader">
            <span class="tr-loader-bar tr-loader-bar--green"></span>
            <span class="tr-loader-bar tr-loader-bar--white"></span>
            <span class="tr-loader-bar tr-loader-bar--red"></span>
          </div>
          <span>Loading…</span>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="tr-footer">
    <div class="tr-checkered-strip" aria-hidden="true"></div>
    <div class="tr-container tr-footer-inner">
      <p class="tr-script tr-footer-script" data-tr-i18n="buonAppetito">Buon Appetito</p>
      <p class="tr-footer-sub">
        <span data-menu-name>Menu</span>
        <span data-availability-sep hidden> · </span>
        <span data-availability></span>
      </p>
      <p class="tr-footer-founded" data-founded-year></p>
      <p class="tr-footer-copy">
        &copy; <span data-current-year></span>
        <span data-menu-name></span>
        · Powered by Akut
      </p>
    </div>
  </footer>
</div>
