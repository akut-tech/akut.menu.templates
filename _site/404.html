<body>
  <!--
    On static hosts (S3 website, GitHub Pages) a clean tenant URL such as
    "/test" has no matching file and is served as this 404 document. We reuse it
    as the dispatcher: resolve the tenant from the path and route to its template.
    If there is no tenant, we show the friendly fallback.
  -->
  <div class="site-wrapper">
    <div id="dispatch-root">
      <div class="menu-loading"><div class="spinner"></div></div>
    </div>
  </div>

  <script src="/assets/js/menu-core.js"></script>
  <script>
    (function () {
      var root = document.getElementById('dispatch-root');

      // Detect whether the URL path begins with /preview/ (after stripping baseUrl).
      var rawPath = location.pathname;
      var baseUrl = (window.AKUT_CONFIG && window.AKUT_CONFIG.baseUrl || '').replace(/\/$/, '');
      if (baseUrl && rawPath.indexOf(baseUrl) === 0) rawPath = rawPath.slice(baseUrl.length);
      var isPreviewPath = rawPath.split('/').filter(Boolean)[0] === 'preview';

      // getTenant / getMenuId already skip "preview" because it is in reserved_paths.
      var tenant = MenuCore.getTenant();

      if (!tenant) {
        MenuCore.renderError(root, { code: 'NO_TENANT' });
        return;
      }

      var menuId = MenuCore.getMenuId();

      if (isPreviewPath) {
        // Fetch from the ephemeral S3 bucket, then route to the template with ?preview=1.
        MenuCore.fetchPreviewMenu(tenant, menuId)
          .then(function (menu) {
            var main = MenuCore.templatePath('main', menu.TemplateId);
            location.replace(MenuCore.withTenant(main, tenant, menuId, 'preview=1'));
          })
          .catch(function (err) {
            MenuCore.renderError(root, err);
          });
        return;
      }

      MenuCore.fetchMenu(tenant, menuId)
        .then(function (menu) {
          var main = MenuCore.templatePath('main', menu.TemplateId);
          location.replace(MenuCore.withTenant(main, tenant, menuId));
        })
        .catch(function (err) {
          MenuCore.renderError(root, err);
        });
    })();
  </script>
</body>
