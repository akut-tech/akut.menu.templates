<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
<title>Menu</title>

<link rel="icon" href="/assets/images/fav.png" type="image/png" sizes="20x20">

<!-- Icon font -->
<link rel="stylesheet" href="/assets/css/bootstrap-icons.css">
<!-- Lightbox (item gallery zoom) -->
<link rel="stylesheet" href="/assets/css/magnific-popup.css">
<!-- Grid / components (tabs) -->
<link rel="stylesheet" href="/assets/css/bootstrap.min.css">
<!-- Theme -->
<link rel="stylesheet" href="/assets/css/style.css">
<!-- Akut menu overrides -->
<link rel="stylesheet" href="/assets/css/menu.css">

<!-- Per-template styling -->
<link rel="stylesheet" href="/assets/css/deepblue.css">


  <!-- Runtime configuration injected from Jekyll _config.yml and _data/*. -->
<script>
  window.AKUT_CONFIG = {
    s3Base: "https://s3-akut-prod-01.s3.eu-west-1.amazonaws.com/products/menu/active/",
    baseUrl: "",
    defaultTemplate: "epicurean",
    reservedPaths: ["templates","assets"],
    languages: {"0":{"key":"Portuguese","code":"pt","label":"Português"},"1":{"key":"Spanish","code":"es","label":"Español"},"2":{"key":"English","code":"en","label":"English"},"3":{"key":"French","code":"fr","label":"Français"},"4":{"key":"German","code":"de","label":"Deutsch"},"5":{"key":"Italian","code":"it","label":"Italiano"}},
    currencies: {"1":{"code":"EUR","symbol":"€"},"2":{"code":"USD","symbol":"$"},"3":{"code":"GBP","symbol":"£"}},
    diets: {"0":"Halal","1":"Kosher","2":"Vegetarian","3":"Vegan","4":"Gluten-Free","5":"Dairy-Free","6":"Nut-Free","7":"Organic","8":"Spicy"},
    templates: {"epicurean":{"name":"Epicurean","main":"/templates/epicurean/","detail":"/templates/epicurean/detail/"},"deepblue":{"name":"Deep Blue","main":"/templates/deepblue/","detail":"/templates/deepblue/detail/"}},
    templateAliases: {"default":"epicurean"}
  };
</script>

</head>
<body>

  <!-- Preloader -->
  <div class="preloader">
    <div class="spinner-wrap">
      <div class="preloader-logo">
        <img src="/assets/images/preloader.svg" alt="" class="img-fluid">
      </div>
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Back to top -->
  <a href="#" id="scroll-top" class="back-to-top-btn"><i class="bi bi-arrow-up"></i></a>

  <div class="site-wrapper">
    

    <main>
      <div class="db">
  <!-- Top bar: logo + language -->
  <header class="db-topbar">
    <div class="db-container db-topbar-inner">
      <a class="db-brand" href="#" data-menu-home>
        <span class="db-brand-mark"><i class="bi bi-water"></i></span>
        <span class="db-brand-text" data-menu-name>Deep Blue</span>
      </a>
      <div class="db-lang lang-switcher" data-lang-switcher hidden>
        <button type="button" class="db-lang-btn lang-current" aria-haspopup="true" aria-expanded="false">
          <i class="bi bi-globe2"></i>
          <span data-lang-current-label>Language</span>
          <i class="bi bi-chevron-down db-lang-caret"></i>
        </button>
        <ul class="db-lang-menu custom-ul" data-lang-menu></ul>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="db-hero">
    <div class="db-hero-overlay"></div>
    <div class="db-container db-hero-inner">
      <p class="db-hero-eyebrow">Fresh from the ocean</p>
      <h1 class="db-hero-title" data-menu-name>Menu</h1>
      <p class="db-hero-sub" data-menu-description></p>
      <p class="db-hero-notes" data-menu-notes></p>
      <a class="db-hero-scroll" href="#db-menu" aria-label="View the menu"><i class="bi bi-chevron-down"></i></a>
    </div>
  </section>

  <!-- Menu (rendered at runtime) -->
  <main id="db-menu" class="db-menu-area">
    <div class="db-container">
      <div id="menu-root">
        <div class="db-loading"><span class="db-spinner"></span></div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="db-footer">
    <div class="db-container db-footer-inner">
      <a class="db-brand db-footer-brand" href="#" data-menu-home>
        <span class="db-brand-mark"><i class="bi bi-water"></i></span>
        <span class="db-brand-text" data-menu-name>Deep Blue</span>
      </a>
      <p class="db-footer-notes" data-menu-notes></p>
      <p class="db-footer-copy">
        &copy; <span data-current-year></span> <span data-menu-name></span>
        <span class="db-footer-powered">· Powered by Akut</span>
      </p>
    </div>
  </footer>
</div>

    </main>

    
  </div>

  <!-- Vendor JS (only what the menu pages use: tabs + gallery zoom) -->
  <script src="/assets/js/vendor/jquery-3.7.1.min.js"></script>
  <script src="/assets/js/vendor/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/vendor/jquery.magnific-popup.min.js"></script>

  <!-- Akut runtime -->
  <script src="/assets/js/menu-core.js"></script>
  
  <script src="/assets/js/templates/deepblue.js"></script>
  

  <!-- Theme init (preloader, back-to-top) -->
  <script src="/assets/js/theme-init.js"></script>
</body>
</html>
